name: EduTrack CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:          
      run:             
        working-directory: polytec_app  

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: polytec_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: system
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configurer les variables d'environnement
        run: |
          echo "SECRET_KEY=django-insecure-test-key-for-ci" >> .env
          echo "DEBUG=True" >> .env
          echo "DB_NAME=polytec_db" >> .env
          echo "DB_USER=admin" >> .env
          echo "DB_PASSWORD=system" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> .env

      - name: Appliquer les migrations
        run: python manage.py migrate

      - name: Lancer les tests Django
        run: python manage.py test

      - name: Tester la connectivité Open Library API
        run: |
          curl -f https://openlibrary.org/subjects/mathematics.json?limit=1 && echo "API accessible" || echo "API inaccessible"