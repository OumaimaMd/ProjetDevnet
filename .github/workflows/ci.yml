name: EduTrack CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: polytec_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: system
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      #  Étape 1 : Récupérer le code 
      - name: 📥 Récupérer le code
        uses: actions/checkout@v3

      #  Étape 2 : Installer Python 
      - name:  Installer Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      #  Étape 3 : Installer les dépendances 
      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      #  Étape 4 : Créer le fichier .env 
      - name: Configurer les variables d'environnement
        run: |
          echo "SECRET_KEY=django-insecure-test-key-for-ci" >> .env
          echo "DEBUG=True" >> .env
          echo "DB_NAME=polytec_db" >> .env
          echo "DB_USER=admin" >> .env
          echo "DB_PASSWORD=system" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> .env

      #  Étape 5 : Migrations 
      - name: Appliquer les migrations
        run: python manage.py migrate

      #  Étape 6 : Lancer les tests 
      - name: Lancer les tests Django
        run: python manage.py test

      #  Étape 7 : Vérifier la connectivité API 
      - name: Tester la connectivité Open Library API
        run: |
          curl -f https://openlibrary.org/subjects/mathematics.json?limit=1 && echo "API accessible" || echo "API inaccessible"