services:

  # ─── Conteneur Django ───
  web:
    build: .
    container_name: edutrack_web
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - media_volume:/app/media

  # ─── Conteneur PostgreSQL ───
  db:
    image: postgres:15
    container_name: edutrack_db
    environment:
      POSTGRES_DB: polytec_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: system
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_volume: