{% extends 'polytechnicien/layout.html' %}
{% load static %}

{% block content %}
<div class="auth-bg">
  <div class="auth-container">
    <div class="auth-header">
      <a href="{% url 'accueil' %}"><h1 class="auth-logo">StudyHub</h1></a>
      <div class="auth-switch">
        <a href="{% url 'login' %}" class="active">Connexion</a>
        <a href="{% url 'register' %}">Inscription</a>
      </div>
    </div>

    <!-- Ajout de la gestion des erreurs -->
    {% if error %}
    <div class="alert alert-danger">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" class="auth-form" autocomplete="off">
      {% csrf_token %}
      
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="username" class="form-control" placeholder="votre@email.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div style="position: relative;">
          <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
          <span class="password-toggle" onclick="togglePassword('password')">
            <i class="fas fa-eye"></i>
          </span>
        </div>
      </div>
      
      <button type="submit" class="auth-btn">
        <i class="fas fa-sign-in-alt"></i> Se connecter
      </button>
      
      <div class="auth-footer">
        <a href="#" class="auth-link">Mot de passe oublié ?</a>
      </div>
      
      <div class="auth-divider">ou</div>
      
      <div class="auth-footer">
        Nouveau sur StudyHub ? <a href="{% url 'register' %}" class="auth-link">Créer un compte</a>
      </div>
    </form>
  </div>
</div>

<script>
function togglePassword(id) {
  const input = document.getElementById(id);
  const icon = document.querySelector(`#${id} + .password-toggle i`);
  if (input.type === "password") {
    input.type = "text";
    icon.classList.replace('fa-eye', 'fa-eye-slash');
  } else {
    input.type = "password";
    icon.classList.replace('fa-eye-slash', 'fa-eye');
  }
}
</script>
{% endblock %}
