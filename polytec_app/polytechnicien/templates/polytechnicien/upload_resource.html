{% extends 'polytechnicien/header.html' %}
{% load static %}
{% block content %}
<head> <title>StudyHub</title> <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}"> </head>
{% for course in courses %}
<a href="{% url 'upload_resource' course.id %}" class="btn">Ajouter resource pour {{ course.name }}</a>
{% endfor %}
<form method="POST" enctype="multipart/form-data">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Envoyer</button>
</form>
{% endblock %}
